syntax = "proto3";

package trpc.transport.v1;

// This file documents the logical transport contract.
// The current package implementation uses a manual gRPC service definition
// that JSON-encodes these fields instead of protobuf-serializing them.
message CallRequest {
  string path = 1;
  string type = 2;
  bytes input = 3;
}

message CallResponse {
  bytes response = 1;
}

service TRPCTransport {
  rpc Call(CallRequest) returns (CallResponse);
}
